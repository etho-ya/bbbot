services:
  bot:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://botuser:botpass@db:5432/trading_bot
      TELEGRAM_SESSION_DIR: /app/session_data
    ports:
      - "0.0.0.0:8001:8000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - ./logs:/app/logs

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d trading_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
